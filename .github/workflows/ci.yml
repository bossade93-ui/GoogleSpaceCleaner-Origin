name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}  # permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Les runners GitHub n'ont pas toujours la plateforme Android 35 (très
      # récente) préinstallée par défaut : on l'installe explicitement plutôt
      # que de dépendre de ce qui se trouve déjà sur l'image du runner.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK platform and build-tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # Le Gradle Wrapper (gradlew) n'est pas versionné dans ce dépôt (le jar
      # binaire ne peut pas être généré sans exécuter Gradle au moins une fois).
      # setup-gradle installe et met en cache Gradle directement sur le runner,
      # ce qui évite cette dépendance : toutes les commandes ci-dessous utilisent
      # `gradle` et non `./gradlew`.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Lint
        run: gradle lint

      - name: Unit tests
        run: gradle testDebugUnitTest

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Dependency vulnerability check
        run: gradle dependencyCheckAnalyze || true
